name: Check PR Target Branch

# Cancel older jobs on PRs when new changes are pushed
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]

jobs:
  check-target-branch:
    runs-on: ubuntu-latest

    steps:
      - name: Check if PR targets arcane-dev
        run: |
          SOURCE_BRANCH="${{ github.event.pull_request.head.ref }}"
          TARGET_BRANCH="${{ github.event.pull_request.base.ref }}"
          echo "PR from: $SOURCE_BRANCH -> $TARGET_BRANCH"

          # Allow arcane-dev to arcane PRs in both directions
          if [[ ("$SOURCE_BRANCH" == "arcane-dev" && "$TARGET_BRANCH" == "arcane") ||
                ("$SOURCE_BRANCH" == "arcane" && "$TARGET_BRANCH" == "arcane-dev") ]]; then
            echo "Allowed: PR between arcane-dev and arcane branches"
            exit 0
          fi

          # For all other PRs, require arcane-dev as target
          if [ "$TARGET_BRANCH" != "arcane-dev" ]; then
            echo "Error: PR must target 'arcane-dev' branch, but targets '$TARGET_BRANCH'"
            echo "Please change the target branch to 'arcane-dev'"
            exit 1
          else
            echo "Success: PR correctly targets 'arcane-dev' branch"
          fi
